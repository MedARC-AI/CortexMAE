# intermediate temporal patch size
t_patch_size: 4

masking: tube

model_kwargs:
  # will override this
  decoding: attn

  # only use reg tokens, not cls. shouldn't make a difference for encoder.
  # also excludes cls from decoder, which is more fair across decoding strategies since
  # non-attn decoding don't use it.
  class_token: false
  reg_tokens: 1

  no_decode_pos: true
  no_embed_class: true
  head_init_scale: 0.0

datasets:
  hcp-train:
    url: /data/fmri-datasets/pretrain/hcpya-all.${input_space}.wds/hcpya-all-${input_space}-{00000..01799}.tar
    buffer_size: 2000

max_checkpoints: 5
checkpoint_period: 20
plot_period: 5
